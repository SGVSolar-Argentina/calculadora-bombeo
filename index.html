<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Bombeo Solar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen p-6 font-sans">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-3xl font-bold text-blue-800 mb-6 border-b pb-4">Calculadora de Bombeo Solar</h1>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 bg-blue-50 p-6 rounded-lg">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Caudal (m³/h)</label>
                <input type="number" id="inputCaudal" step="0.1" class="w-full p-2 border rounded focus:ring focus:ring-blue-200" placeholder="Ej: 5.5">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Altura (mts)</label>
                <input type="number" id="inputAltura" step="0.1" class="w-full p-2 border rounded focus:ring focus:ring-blue-200" placeholder="Ej: 40">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Tipo</label>
                <select id="selectTipo" class="w-full p-2 border rounded focus:ring focus:ring-blue-200"><option value="">Todos</option></select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Diámetro (Pulgadas)</label>
                <select id="selectDiametro" class="w-full p-2 border rounded focus:ring focus:ring-blue-200"><option value="">Todos</option></select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Material Turbina</label>
                <select id="selectMaterial" class="w-full p-2 border rounded focus:ring focus:ring-blue-200"><option value="">Todos</option></select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Voltaje DC (V)</label>
                <select id="selectVoltaje" class="w-full p-2 border rounded focus:ring focus:ring-blue-200"><option value="">Todos</option></select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Potencia Motor (W)</label>
                <select id="selectPotencia" class="w-full p-2 border rounded focus:ring focus:ring-blue-200"><option value="">Todos</option></select>
            </div>
            
            <div class="md:col-span-4 flex justify-end mt-4">
                <button onclick="filtrarBombas()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow">
                    <i class="fas fa-search mr-2"></i> Buscar Bombas
                </button>
            </div>
        </div>

        <div id="loading" class="text-center text-gray-500 py-10 hidden">
            <i class="fas fa-spinner fa-spin fa-2x mb-2"></i>
            <p>Cargando base de datos...</p>
        </div>

        <div id="resultados" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

<script>
    // ==========================================
    // 1. PEGA TU URL DE APPS SCRIPT AQUÍ ABAJO
    // ==========================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbwrclJ08pMWJu6WIgRiquGasNJewsQgNvmBCXNJigdTpwnCHJdx9l5IKzu94Xd1iP8R/exec';
    
    let allPumps = [];

    // Al cargar la página, buscamos los datos
    window.onload = async function() {
        if(API_URL === 'AQUI_PEGARAS_TU_URL_DE_APPS_SCRIPT') {
            document.getElementById('resultados').innerHTML = '<p class="text-red-500 col-span-2">⚠️ Debes pegar la URL de tu Google Apps Script en el código HTML.</p>';
            return;
        }

        document.getElementById('loading').classList.remove('hidden');
        
        try {
            const response = await fetch(API_URL);
            allPumps = await response.json();
            
            if(allPumps.error) {
                alert("Error de la API: " + allPumps.error);
                return;
            }

            popularDesplegables();
            document.getElementById('loading').classList.add('hidden');
            mostrarBombas(allPumps); // Muestra todas por defecto
        } catch (error) {
            console.error("Error al cargar datos:", error);
            document.getElementById('resultados').innerHTML = '<p class="text-red-500 col-span-2">Error al conectar con la base de datos. Verifica la URL de Apps Script y los permisos (CORS).</p>';
            document.getElementById('loading').classList.add('hidden');
        }
    };

    function obtenerUnicos(columna) {
        const valores = allPumps.map(bomba => bomba[columna]).filter(val => val !== "" && val !== undefined);
        return [...new Set(valores)].sort();
    }

    function popularDesplegables() {
        const selectores = [
            { id: 'selectTipo', col: 'Tipo' },
            { id: 'selectDiametro', col: 'Diámetro' },
            { id: 'selectMaterial', col: 'Material turbina' },
            { id: 'selectVoltaje', col: 'Voltaje DC' },
            { id: 'selectPotencia', col: 'Potencia motor' }
        ];

        selectores.forEach(sel => {
            const selectElement = document.getElementById(sel.id);
            const valoresUnicos = obtenerUnicos(sel.col);
            valoresUnicos.forEach(val => {
                let option = document.createElement('option');
                option.value = val;
                option.text = val;
                selectElement.appendChild(option);
            });
        });
    }

    function parseNum(val) {
        if (!val) return 0;
        if (typeof val === 'number') return val;
        return parseFloat(val.toString().replace(',', '.'));
    }

    function filtrarBombas() {
        const qCaudal = parseNum(document.getElementById('inputCaudal').value);
        const qAltura = parseNum(document.getElementById('inputAltura').value);
        
        const fTipo = document.getElementById('selectTipo').value;
        const fDiametro = document.getElementById('selectDiametro').value;
        const fMaterial = document.getElementById('selectMaterial').value;
        const fVoltaje = document.getElementById('selectVoltaje').value;
        const fPotencia = document.getElementById('selectPotencia').value;

        const filtradas = allPumps.filter(bomba => {
            // Filtros de Desplegables
            if (fTipo && bomba['Tipo'] != fTipo) return false;
            if (fDiametro && bomba['Diámetro'] != fDiametro) return false;
            if (fMaterial && bomba['Material turbina'] != fMaterial) return false;
            if (fVoltaje && String(bomba['Voltaje DC']) !== String(fVoltaje)) return false;
            if (fPotencia && String(bomba['Potencia motor']) !== String(fPotencia)) return false;

            // Filtros Matemáticos (Caudal y Altura Ideal)
            if (qCaudal > 0) {
                const minC = parseNum(bomba['Caudal Min. Ideal']);
                const maxC = parseNum(bomba['Caudal Max. Ideal']);
                if (qCaudal < minC || qCaudal > maxC) return false;
            }

            if (qAltura > 0) {
                const minA = parseNum(bomba['Altura Min. Ideal']);
                const maxA = parseNum(bomba['Altura Max. Ideal']);
                if (qAltura < minA || qAltura > maxA) return false;
            }

            return true;
        });

        mostrarBombas(filtradas);
    }

    function toggleElement(id) {
        const el = document.getElementById(id);
        el.classList.toggle('hidden');
    }

    function mostrarBombas(bombas) {
        const container = document.getElementById('resultados');
        container.innerHTML = '';

        if(bombas.length === 0) {
            container.innerHTML = '<p class="text-gray-500 col-span-2 text-center py-4">No se encontraron bombas con esas especificaciones.</p>';
            return;
        }

        bombas.forEach((bomba, index) => {
            const html = `
            <div class="bg-white border rounded-lg shadow-sm p-5 hover:shadow-md transition">
                <div class="border-b pb-3 mb-3">
                    <h2 class="text-xl font-bold text-blue-700">
                        <a href="${bomba['Modelo']}.html" target="_blank" class="hover:underline" title="Ver ficha técnica">
                            ${bomba['Modelo']} <i class="fas fa-external-link-alt text-sm text-gray-400"></i>
                        </a>
                    </h2>
                    <p class="text-sm text-gray-600 mt-1">${bomba['Descripción']}</p>
                </div>
                
                <div class="grid grid-cols-2 gap-2 text-sm mb-4">
                    <div><b>Tipo:</b> ${bomba['Tipo']}</div>
                    <div><b>Diámetro:</b> ${bomba['Diámetro']}"</div>
                    <div><b>Turbina:</b> ${bomba['Material turbina']}</div>
                    <div><b>Voltaje:</b> ${bomba['Voltaje DC']}V</div>
                    <div><b>Potencia:</b> ${bomba['Potencia motor']}W</div>
                    <div><b>Nominal:</b> ${bomba['Caudal nominal']} m³/h a ${bomba['Altura nominal']}m</div>
                </div>

                <button onclick="toggleElement('tech-${index}')" class="w-full text-left bg-gray-50 hover:bg-gray-100 p-2 rounded border text-sm font-semibold text-gray-700 flex justify-between items-center mb-3">
                    Rangos Ideales de Trabajo <i class="fas fa-chevron-down"></i>
                </button>
                <div id="tech-${index}" class="hidden bg-gray-50 p-3 rounded border text-sm grid grid-cols-2 gap-4 mb-3">
                    <div>
                        <span class="block font-bold text-blue-600 border-b mb-1">Caudal Ideal (m³/h)</span>
                        Mín: ${bomba['Caudal Min. Ideal']} <br>
                        Med: ${bomba['Caudal Med. Ideal']} <br>
                        Máx: ${bomba['Caudal Max. Ideal']}
                    </div>
                    <div>
                        <span class="block font-bold text-blue-600 border-b mb-1">Altura Ideal (mts)</span>
                        Mín: ${bomba['Altura Min. Ideal']} <br>
                        Med: ${bomba['Altura Med. Ideal']} <br>
                        Máx: ${bomba['Altura Max. Ideal']}
                    </div>
                </div>

                <div class="space-y-2 pt-2 border-t">
                    <div class="flex justify-between items-center bg-green-50 p-2 rounded">
                        <span class="text-sm font-semibold text-green-800">Precio SGV</span>
                        <div class="flex items-center gap-3">
                            <span id="price-sgv-${index}" class="hidden font-bold text-green-700">${bomba['Precios SGV U$S sin IVA'] || 'N/A'}</span>
                            <button onclick="toggleElement('price-sgv-${index}')" class="text-gray-400 hover:text-gray-700"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-blue-50 p-2 rounded">
                        <span class="text-sm font-semibold text-blue-800">Precio Fortezza</span>
                        <div class="flex items-center gap-3">
                            <span id="price-fortezza-${index}" class="hidden font-bold text-blue-700">${bomba['Precios Fortezza U$S sin IVA'] || 'N/A'}</span>
                            <button onclick="toggleElement('price-fortezza-${index}')" class="text-gray-400 hover:text-gray-700"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-orange-50 p-2 rounded">
                        <span class="text-sm font-semibold text-orange-800">Precio Instalador</span>
                        <div class="flex items-center gap-3">
                            <span id="price-inst-${index}" class="hidden font-bold text-orange-700">${bomba['Precios Instalador U$S sin IVA'] || 'N/A'}</span>
                            <button onclick="toggleElement('price-inst-${index}')" class="text-gray-400 hover:text-gray-700"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            `;
            container.innerHTML += html;
        });
    }
</script>
</body>
</html>
