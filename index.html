<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Bombeo Solar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen p-6 font-sans relative">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg p-8 relative z-10">
        <h1 class="text-3xl font-bold text-blue-800 mb-6 border-b pb-4">Calculadora de Bombeo Solar</h1>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 bg-blue-50 p-6 rounded-lg">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Caudal (m³/h)</label>
                <input type="number" id="inputCaudal" step="0.1" class="w-full p-2 border rounded focus:ring focus:ring-blue-200" placeholder="Ej: 5.5">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Altura (mts)</label>
                <input type="number" id="inputAltura" step="0.1" class="w-full p-2 border rounded focus:ring focus:ring-blue-200" placeholder="Ej: 40">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Tipo</label>
                <select id="selectTipo" class="w-full p-2 border rounded focus:ring focus:ring-blue-200"><option value="">Todos</option></select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Diámetro (Pulgadas)</label>
                <select id="selectDiametro" class="w-full p-2 border rounded focus:ring focus:ring-blue-200"><option value="">Todos</option></select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Material Turbina</label>
                <select id="selectMaterial" class="w-full p-2 border rounded focus:ring focus:ring-blue-200"><option value="">Todos</option></select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Voltaje DC (V)</label>
                <select id="selectVoltaje" class="w-full p-2 border rounded focus:ring focus:ring-blue-200"><option value="">Todos</option></select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Potencia Motor (W)</label>
                <select id="selectPotencia" class="w-full p-2 border rounded focus:ring focus:ring-blue-200"><option value="">Todos</option></select>
            </div>
            
            <div class="md:col-span-4 flex justify-end mt-4">
                <button onclick="filtrarBombas()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow">
                    <i class="fas fa-search mr-2"></i> Buscar Bombas
                </button>
            </div>
        </div>

        <div id="loading" class="text-center text-gray-500 py-10 hidden">
            <i class="fas fa-spinner fa-spin fa-2x mb-2"></i>
            <p>Cargando base de datos...</p>
        </div>

        <div id="resultados" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-3xl flex flex-col overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h3 id="modal-title" class="text-xl font-bold text-blue-800">Curva de Rendimiento</h3>
                <button onclick="cerrarModal()" class="text-gray-500 hover:text-red-500 text-2xl font-bold leading-none">&times;</button>
            </div>
            <div id="modal-content" class="p-6 flex justify-center items-center bg-gray-100 min-h-[300px]">
                </div>
        </div>
    </div>

<script>
    // ==========================================
    // ¡PEGA AQUÍ TU NUEVA URL DE APPS SCRIPT!
    // ==========================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbwQ-YnEQm2laOeknzDjy71VCHiUcyT4m_r0wVyVJRA-Vy22jXVfZamBfOiutVJjeYeM/exec';
    
    let allPumps = [];

    window.onload = async function() {
        document.getElementById('loading').classList.remove('hidden');
        try {
            const response = await fetch(API_URL);
            const json = await response.json();
            if(json.error) {
                alert("Error: " + json.error);
                return;
            }
            allPumps = json.datos; 
            popularDesplegables();
            document.getElementById('loading').classList.add('hidden');
            mostrarBombas(allPumps); 
        } catch (error) {
            document.getElementById('resultados').innerHTML = '<p class="text-red-500 col-span-2 text-center font-bold">Error al conectar con la base de datos.</p>';
            document.getElementById('loading').classList.add('hidden');
        }
    };

    function obtenerUnicos(columna) {
        return [...new Set(allPumps.map(b => b[columna]).filter(v => v !== "" && v !== undefined))].sort();
    }

    function popularDesplegables() {
        const selectores = [
            { id: 'selectTipo', col: 'Tipo' },
            { id: 'selectDiametro', col: 'Diámetro' },
            { id: 'selectMaterial', col: 'Material turbina' },
            { id: 'selectVoltaje', col: 'Voltaje DC' },
            { id: 'selectPotencia', col: 'Potencia motor' }
        ];

        selectores.forEach(sel => {
            const selectElement = document.getElementById(sel.id);
            obtenerUnicos(sel.col).forEach(val => {
                let option = document.createElement('option');
                option.value = val;
                option.text = val;
                selectElement.appendChild(option);
            });
        });
    }

    function parseNum(val) {
        if (!val) return 0;
        if (typeof val === 'number') return val;
        return parseFloat(val.toString().replace(',', '.'));
    }

    function filtrarBombas() {
        const qCaudal = parseNum(document.getElementById('inputCaudal').value);
        const qAltura = parseNum(document.getElementById('inputAltura').value);
        const fTipo = document.getElementById('selectTipo').value;
        const fDiametro = document.getElementById('selectDiametro').value;
        const fMaterial = document.getElementById('selectMaterial').value;
        const fVoltaje = document.getElementById('selectVoltaje').value;
        const fPotencia = document.getElementById('selectPotencia').value;

        const filtradas = allPumps.filter(bomba => {
            if (fTipo && bomba['Tipo'] != fTipo) return false;
            if (fDiametro && String(bomba['Diámetro']) != String(fDiametro)) return false;
            if (fMaterial && bomba['Material turbina'] != fMaterial) return false;
            if (fVoltaje && String(bomba['Voltaje DC']) !== String(fVoltaje)) return false;
            if (fPotencia && String(bomba['Potencia motor']) !== String(fPotencia)) return false;

            if (qCaudal > 0 && (qCaudal < parseNum(bomba['Caudal Min. Ideal']) || qCaudal > parseNum(bomba['Caudal Max. Ideal']))) return false;
            if (qAltura > 0 && (qAltura < parseNum(bomba['Altura Min. Ideal']) || qAltura > parseNum(bomba['Altura Max. Ideal']))) return false;

            return true;
        });
        mostrarBombas(filtradas);
    }

    function toggleElement(id) {
        document.getElementById(id).classList.toggle('hidden');
    }

    function mostrarBombas(bombas) {
        const container = document.getElementById('resultados');
        container.innerHTML = '';

        if(bombas.length === 0) {
            container.innerHTML = '<p class="text-gray-500 col-span-2 text-center py-4">No se encontraron bombas con estas características.</p>';
            return;
        }

        bombas.forEach((bomba, index) => {
            const html = `
            <div class="bg-white border rounded-lg shadow-sm p-5 hover:shadow-lg transition duration-300 flex flex-col">
                <div class="border-b pb-3 mb-3">
                    <h2 class="text-xl font-bold text-blue-700 cursor-pointer hover:underline flex items-center gap-2" onclick="abrirDetalleModelo('${bomba['Modelo']}')" title="Ver Curva de Rendimiento">
                        ${bomba['Modelo']} <i class="fas fa-image text-blue-500"></i>
                    </h2>
                    <p class="text-sm text-gray-600 mt-1">${bomba['Descripción']}</p>
                </div>
                
                <div class="grid grid-cols-2 gap-2 text-sm mb-4">
                    <div><b class="text-gray-700">Tipo:</b> ${bomba['Tipo']}</div>
                    <div><b class="text-gray-700">Diámetro:</b> ${bomba['Diámetro']}"</div>
                    <div><b class="text-gray-700">Turbina:</b> ${bomba['Material turbina']}</div>
                    <div><b class="text-gray-700">Voltaje:</b> ${bomba['Voltaje DC']}V</div>
                    <div><b class="text-gray-700">Potencia:</b> ${bomba['Potencia motor']}W</div>
                    <div><b class="text-gray-700">Nominal:</b> ${bomba['Caudal nominal']} m³/h a ${bomba['Altura nominal']}m</div>
                </div>

                <button onclick="toggleElement('tech-${index}')" class="w-full text-left bg-gray-50 hover:bg-gray-100 p-2 rounded border text-sm font-semibold text-gray-700 flex justify-between items-center mb-3">
                    Rangos Ideales de Trabajo <i class="fas fa-chevron-down"></i>
                </button>
                <div id="tech-${index}" class="hidden bg-gray-50 p-3 rounded border text-sm grid grid-cols-2 gap-4 mb-3">
                    <div><span class="block font-bold text-blue-600 border-b mb-1">Caudal (m³/h)</span>Mín: ${bomba['Caudal Min. Ideal']} <br>Med: ${bomba['Caudal Med. Ideal']} <br>Máx: ${bomba['Caudal Max. Ideal']}</div>
                    <div><span class="block font-bold text-blue-600 border-b mb-1">Altura (mts)</span>Mín: ${bomba['Altura Min. Ideal']} <br>Med: ${bomba['Altura Med. Ideal']} <br>Máx: ${bomba['Altura Max. Ideal']}</div>
                </div>

                <div class="space-y-2 pt-2 border-t mt-auto">
                    <div class="flex justify-between items-center bg-green-50 p-2 rounded">
                        <span class="text-sm font-semibold text-green-800">Precio SGV</span>
                        <div class="flex items-center gap-3">
                            <span id="price-sgv-${index}" class="hidden font-bold text-green-700">${bomba['Precios SGV U$S sin IVA'] || 'N/A'}</span>
                            <button onclick="toggleElement('price-sgv-${index}')" class="text-gray-400 hover:text-gray-700"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-blue-50 p-2 rounded">
                        <span class="text-sm font-semibold text-blue-800">Precio Fortezza</span>
                        <div class="flex items-center gap-3">
                            <span id="price-fortezza-${index}" class="hidden font-bold text-blue-700">${bomba['Precios Fortezza U$S sin IVA'] || 'N/A'}</span>
                            <button onclick="toggleElement('price-fortezza-${index}')" class="text-gray-400 hover:text-gray-700"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-orange-50 p-2 rounded">
                        <span class="text-sm font-semibold text-orange-800">Precio Instalador</span>
                        <div class="flex items-center gap-3">
                            <span id="price-inst-${index}" class="hidden font-bold text-orange-700">${bomba['Precios Instalador U$S sin IVA'] || 'N/A'}</span>
                            <button onclick="toggleElement('price-inst-${index}')" class="text-gray-400 hover:text-gray-700"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            `;
            container.innerHTML += html;
        });
    }

    // --- LÓGICA DE LA FOTO EN EL MODAL --- //
    async function abrirDetalleModelo(modelo) {
        const modal = document.getElementById('modal');
        const content = document.getElementById('modal-content');
        const title = document.getElementById('modal-title');
        
        modal.classList.remove('hidden');
        title.innerText = `Curva: ${modelo}`;
        content.innerHTML = `<div class="text-center py-10"><i class="fas fa-spinner fa-spin fa-2x mb-2 text-blue-500"></i><p class="text-gray-600">Buscando imagen en Google Drive...</p></div>`;

        try {
            const res = await fetch(`${API_URL}?modelo=${encodeURIComponent(modelo)}`);
            const json = await res.json();

            if (json.error) {
                content.innerHTML = `<p class="text-red-500 font-bold bg-red-50 p-4 rounded text-center">⚠️ ${json.error}</p>`;
                return;
            }

            if (json.imagen) {
                // Si encontró la foto, la dibuja
                content.innerHTML = `<img src="${json.imagen}" alt="Curva de ${modelo}" class="max-w-full max-h-[70vh] rounded shadow-md object-contain">`;
            } else {
                // Si no encontró ningún archivo con ese nombre en Drive
                content.innerHTML = `<div class="text-center"><i class="fas fa-image-slash fa-3x text-gray-300 mb-3"></i><p class="text-gray-500 text-lg">No se encontró la imagen para el modelo <b>${modelo}</b> en la carpeta de Drive.</p></div>`;
            }

        } catch (e) {
            content.innerHTML = `<p class="text-red-500 text-center py-6">Error de conexión al buscar la imagen.</p>`;
        }
    }

    function cerrarModal() {
        document.getElementById('modal').classList.add('hidden');
    }
</script>
</body>
</html>
